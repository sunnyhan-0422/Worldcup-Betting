<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>FM사업부 월드컵 3차전 스코어 내기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
}

/* ── 공통 ── */
.screen { display: none; }
.screen.active { display: flex; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━
   1페이지
━━━━━━━━━━━━━━━━━━━━━━━━ */
#s1 {
  flex-direction: column;
  height: 100dvh; height: 100vh;
  max-width: 480px; margin: 0 auto; width: 100%;
  overflow: hidden;
  background: linear-gradient(160deg, #1a1a6e 0%, #2a2a9e 30%, #3535c8 60%, #4040e0 100%);
  position: relative;
}

/* 단청 상단 장식 */
.dancheong {
  flex-shrink: 0;
  width: 100%; height: 44px;
  overflow: hidden;
  position: relative;
}
.dancheong svg { width: 100%; height: 100%; }

/* 헤더 타이틀 */
.s1-title-area {
  flex-shrink: 0;
  text-align: center;
  padding: 6px 16px 8px;
}
.s1-dept { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.55); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 2px; }
.s1-title { font-size: 17px; font-weight: 900; color: #fff; letter-spacing: -0.3px; }

/* 경기 정보 카드 (이미지3 스타일) */
.match-card {
  flex-shrink: 0;
  margin: 0 14px 10px;
  background: rgba(30,30,100,0.7);
  border-radius: 16px;
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(8px);
}
.match-flag {
  border-radius: 8px;
  border: 1.5px solid rgba(255,255,255,0.3);
  background: transparent;
  width: 52px; height: 36px;
  overflow: hidden;
  flex-shrink: 0;
}
.match-flag img { width: 100%; height: 100%; object-fit: cover; }
.match-flag.kr img { object-fit: contain; }
.match-info { text-align: center; flex: 1; padding: 0 8px; }
.match-teams { font-size: 12px; font-weight: 600; color: #7eb8ff; margin-bottom: 3px; }
.match-datetime { font-size: 15px; font-weight: 900; color: #fff; }

/* 안내 문구 */
.pick-guide {
  flex-shrink: 0;
  text-align: center;
  font-size: 11px; font-weight: 500;
  color: rgba(255,255,255,0.55);
  margin-bottom: 6px;
}

/* 그리드 영역 */
.s1-grid-area {
  flex: 1; min-height: 0;
  padding: 0 14px;
  display: flex; flex-direction: column;
}

/* 스코어 그리드 */
.score-grid-wrap {
  flex: 1; min-height: 0;
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
  overflow: hidden;
  display: flex; align-items: stretch;
}
table.pick-grid {
  border-collapse: collapse; width: 100%; height: 100%; table-layout: fixed;
}
table.pick-grid th, table.pick-grid td {
  border: 1px solid rgba(255,255,255,0.08);
  text-align: center; vertical-align: middle;
}
table.pick-grid thead th.corner {
  background: rgba(255,255,255,0.04);
  width: 38px; padding: 0; position: relative;
}
.corner-line { display: none; }
.corner-top { display: none; }
.corner-bot { display: none; }
/* 축 레이블 */
.grid-axis-outer { display: flex; align-items: stretch; flex: 1; min-height: 0; }
.grid-y-label {
  writing-mode: vertical-lr;
  font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.55);
  letter-spacing: 1px; text-align: center;
  width: 18px; flex-shrink: 0; align-self: center;
}
.grid-x-label {
  font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.55);
  letter-spacing: 1px; text-align: center;
  margin-bottom: 4px; flex-shrink: 0;
}
.grid-x-inner { flex: 1; min-width: 0; display: flex; flex-direction: column; }
table.pick-grid thead th.score-col {
  background: rgba(255,255,255,0.05);
  font-size: clamp(13px, 3.5vw, 18px); font-weight: 800;
  color: rgba(255,255,255,0.9); padding: 6px 2px;
}
table.pick-grid tbody th {
  background: rgba(255,255,255,0.05);
  font-size: clamp(13px, 3.5vw, 18px); font-weight: 800;
  color: rgba(255,255,255,0.9); padding: 4px; width: 38px;
}
table.pick-grid td {
  padding: 2px; background: transparent;
  cursor: pointer; transition: background 0.12s; position: relative;
}
table.pick-grid td:hover  { background: rgba(255,255,255,0.08); }
table.pick-grid td.selected {
  background: rgba(100,160,255,0.25) !important;
  box-shadow: inset 0 0 0 2px rgba(100,180,255,0.8);
}
table.pick-grid td.has-bet { background: transparent; }
td.selected .cell-dot { display: none; }
.pick-score-badge {
  display: none; position: absolute; inset: 0;
  align-items: center; justify-content: center;
  font-size: clamp(16px, 4.2vw, 24px);
}
td.selected .pick-score-badge { display: flex; }

/* 선택표시 + 카운터 */
.s1-info {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 2px 4px; min-height: 28px;
}
.score-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(100,160,255,0.2);
  border: 1.5px solid rgba(100,180,255,0.6);
  border-radius: 14px; padding: 3px 12px;
  font-size: 13px; font-weight: 800; color: #7eb8ff;
}
.score-pill-empty { font-size: 11px; color: rgba(255,255,255,0.3); }
.cnt-num { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); }

/* 베팅 바 */
.bet-bottom {
  flex-shrink: 0;
  padding: 6px 14px 20px;
}
.bet-row { display: flex; gap: 8px; align-items: center; }
.bet-name-input {
  flex: 1; padding: 13px 16px;
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 14px; font-size: 15px;
  background: rgba(255,255,255,0.1); color: #fff; outline: none;
  font-weight: 600;
}
.bet-name-input::placeholder { color: rgba(255,255,255,0.3); }
.bet-name-input:focus { border-color: rgba(100,180,255,0.8); background: rgba(255,255,255,0.14); }
.bet-btn {
  padding: 13px 20px;
  background: linear-gradient(135deg, #4a6fff, #6a3fff);
  color: #fff; border: none; border-radius: 14px;
  font-size: 14px; font-weight: 900; cursor: pointer; white-space: nowrap;
  box-shadow: 0 4px 14px rgba(74,111,255,0.4);
  transition: transform 0.1s, box-shadow 0.1s;
}
.bet-btn:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(74,111,255,0.3); }
.bet-btn:disabled {
  background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.25);
  cursor: not-allowed; box-shadow: none;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━
   2페이지
━━━━━━━━━━━━━━━━━━━━━━━━ */
#s2 {
  flex-direction: column;
  height: 100dvh; height: 100vh;
  max-width: 480px; margin: 0 auto; width: 100%;
  background: linear-gradient(160deg, #1a1a6e 0%, #2a2a9e 35%, #3535c8 100%);
  overflow: hidden;
}
.s2-header {
  flex-shrink: 0;
  padding: 14px 16px 12px;
  text-align: center; cursor: pointer;
  background: rgba(0,0,0,0.2);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.s2-htitle { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.55); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 2px; }
.s2-hsub2 { font-size: 17px; font-weight: 900; color: #fff; letter-spacing: -0.3px; margin-bottom: 0; }
.s2-hsub { font-size: 11px; color: rgba(255,255,255,0.5); }
.s2-my-bet { font-size: 12px; color: #ffd966; font-weight: 700; margin-top: 4px; }

/* 2페이지 내기판 그리드 */
.s2-inner {
  flex: 1; min-height: 0;
  width: 100%; padding: 10px 14px 16px;
  display: flex; flex-direction: column;
}
.grid-card {
  flex: 1; min-height: 0;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  overflow: hidden;
  display: flex; align-items: stretch;
}
table.bingo {
  border-collapse: collapse; width: 100%; height: 100%;
  table-layout: fixed;
}
table.bingo th, table.bingo td {
  border: 1px solid rgba(255,255,255,0.08);
  text-align: center; vertical-align: middle;
}
table.bingo thead th.corner {
  background: rgba(255,255,255,0.05);
  width: 38px; padding: 0;
  position: relative;
}
.corner-line2 { display: none; }
.corner-top2 { display: none; }
.corner-bot2 { display: none; }
/* 2페이지 축 레이블 */
.grid2-axis-outer { display: flex; align-items: stretch; flex: 1; min-height: 0; }
.grid2-y-label {
  writing-mode: vertical-lr;
  font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5);
  letter-spacing: 1px; text-align: center;
  width: 18px; flex-shrink: 0; align-self: center;
}
.grid2-x-label {
  font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5);
  letter-spacing: 1px; text-align: center;
  margin-bottom: 4px; flex-shrink: 0;
}
.grid2-x-inner { flex: 1; min-width: 0; display: flex; flex-direction: column; }
table.bingo thead th.score-col {
  background: rgba(255,255,255,0.05);
  font-size: clamp(13px, 3.5vw, 18px); font-weight: 800;
  color: rgba(255,255,255,0.9); padding: 6px 2px;
}
table.bingo tbody th {
  background: rgba(255,255,255,0.05);
  font-size: clamp(13px, 3.5vw, 18px); font-weight: 800;
  color: rgba(255,255,255,0.9);
  padding: 4px; width: 38px;
}
table.bingo td {
  padding: 4px 3px;
  background: transparent; vertical-align: middle;
}
.cell-names { display: flex; flex-wrap: wrap; gap: 3px; align-items: center; justify-content: center; }

/* 포스트잇 → 네이버 스타일 배지 */
.sticky {
  display: inline-block; padding: 4px 9px;
  border-radius: 20px;
  font-size: 12px; font-weight: 700; color: #111;
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.sticky-0 { background: #ffd966; }
.sticky-1 { background: #ff8fab; }
.sticky-2 { background: #90e0a0; }
.sticky-3 { background: #ffb347; }
.sticky-4 { background: #80deea; }
.sticky-5 { background: #c8f7a0; }
.sticky.mine { box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
td.winner { background: rgba(255,215,0,0.1); }
td.winner .sticky { box-shadow: 0 0 0 2px #ffd700, 0 2px 8px rgba(0,0,0,0.3); }
td.winner .sticky.mine { box-shadow: 0 0 0 2px #ffd700, 0 2px 8px rgba(0,0,0,0.3); }

/* s2-footer removed */

/* 토스트 */
.toast {
  position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
  background: rgba(74,111,255,0.95); color: #fff;
  padding: 9px 20px; border-radius: 20px; font-size: 13px; font-weight: 700;
  opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 999; white-space: nowrap;
  box-shadow: 0 4px 16px rgba(74,111,255,0.4);
}
.toast.show { opacity: 1; }
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, get, set } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJEhklXXDr-62LlywdLEmYEc_dV3jtx2k",
  authDomain: "worldcup-betting-f1917.firebaseapp.com",
  databaseURL: "https://worldcup-betting-f1917-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "worldcup-betting-f1917",
  storageBucket: "worldcup-betting-f1917.firebasestorage.app",
  messagingSenderId: "1061763331709",
  appId: "1:1061763331709:web:b6858f74d78677f6502314"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const COLORS = ['sticky-0','sticky-1','sticky-2','sticky-3','sticky-4','sticky-5'];
let players = [];
let selectedSA = null;
let selectedKO = null;
let myName = null;
let myBetSA = null;
let myBetKO = null;

// ── 기기 고유 ID 생성/조회 ──
function getDeviceId() {
  let id = localStorage.getItem('wc_device_id');
  if (!id) {
    id = 'dev_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
    localStorage.setItem('wc_device_id', id);
  }
  return id;
}
const deviceId = getDeviceId();

// ── 1페이지 픽 그리드 렌더 ──
function renderPickGrid() {
  const table = document.getElementById('pick-grid');
  // 헤더
  let html = '<thead><tr>';
  html += '<th class="corner"></th>';
  for (let k = 0; k <= 4; k++) html += '<th class="score-col">' + k + '</th>';
  html += '</tr></thead><tbody>';

  // 베팅수 맵 (점만 표시)
  const betMap = {};
  players.forEach(p => {
    const key = p.sa + '_' + p.ko;
    betMap[key] = (betMap[key] || 0) + 1;
  });

  for (let s = 0; s <= 4; s++) {
    html += '<tr><th>' + s + '</th>';
    for (let k = 0; k <= 4; k++) {
      const key = s + '_' + k;
      const isSelected = (selectedSA === s && selectedKO === k);
      const hasBet = betMap[key] > 0;
      let cls = '';
      if (isSelected) cls = ' selected';
      else if (hasBet) cls = ' has-bet';
      html += '<td class="' + cls + '" onclick="pickCell(' + s + ',' + k + ')">'
            + '<div class="pick-score-badge">⚽</div>'
            + '</td>';
    }
    html += '</tr>';
  }
  html += '</tbody>';
  table.innerHTML = html;
}

// ── 셀 선택 ──
window.pickCell = function(sa, ko) {
  selectedSA = sa;
  selectedKO = ko;
  renderPickGrid();
  // 스코어 표시 업데이트
  document.getElementById('score-display').innerHTML =
    '<span class="score-pill">대한민국 ' + ko + ' : ' + sa + ' 남아공</span>';
  updateBetBtn();
};

function updateBetBtn() {
  const nm = document.getElementById('nm').value.trim();
  const btn = document.getElementById('bet-btn');
  btn.disabled = !(nm && selectedSA !== null && selectedKO !== null);
}

document.getElementById('nm').addEventListener('input', updateBetBtn);
document.getElementById('nm').addEventListener('keydown', e => { if (e.key === 'Enter') doBet(); });

// ── 베팅 실행 ──
window.doBet = function() {
  const nm = document.getElementById('nm').value.trim();
  if (!nm) { showToast('이름을 입력해주세요'); return; }
  if (selectedSA === null || selectedKO === null) { showToast('스코어 칸을 선택해주세요'); return; }
  if (players.find(p => p.name === nm)) {
    showToast('같은 이름이 이미 있어요 😅'); return;
  }

  myName = nm;
  myBetSA = selectedSA;
  myBetKO = selectedKO;

  push(ref(db, "predictions"), {
    name: nm,
    sa: selectedSA,
    ko: selectedKO,
    createdAt: Date.now()
  });

  // 기기 베팅 기록 Firebase에 저장
  set(ref(db, 'devices/' + deviceId), {
    name: nm,
    sa: selectedSA,
    ko: selectedKO,
    createdAt: Date.now()
  });

  // 2페이지로
  renderGrid();
  goToPage2(nm, selectedSA, selectedKO);
  showToast('🎯 베팅 완료!');
};

// ── 2페이지 내기판 렌더 ──
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderGrid() {
  const map = {};
  players.forEach((p, i) => {
    const key = p.sa + '_' + p.ko;
    if (!map[key]) map[key] = [];
    map[key].push({ name: p.name, colorIdx: i % COLORS.length });
  });

  let html = '<thead><tr>';
  html += '<th class="corner"></th>';
  for (let k = 0; k <= 4; k++) html += '<th class="score-col">' + k + '</th>';
  html += '</tr></thead><tbody>';

  for (let s = 0; s <= 4; s++) {
    html += '<tr><th>' + s + '</th>';
    for (let k = 0; k <= 4; k++) {
      const entries = map[s + '_' + k] || [];
      html += '<td><div class="cell-names">';
      entries.forEach(e => {
        const isMine = (myName && e.name === myName);
        html += '<span class="sticky ' + COLORS[e.colorIdx] + (isMine ? ' mine' : '') + '">'
              + esc(e.name) + '</span>';
      });
      html += '</div></td>';
    }
    html += '</tr>';
  }
  html += '</tbody>';
  document.getElementById('grid').innerHTML = html;
}

// ── Firebase 실시간 동기화 ──
onValue(ref(db, "predictions"), (snapshot) => {
  const data = snapshot.val() || {};
  players = Object.values(data);
  document.getElementById('cnt').textContent = players.length + '명 참여중';

  renderPickGrid();
  if (document.getElementById('s2').classList.contains('active')) {
    renderGrid();
  }
});

// goBack removed

// ── 관리자 초기화 (헤더 10번 클릭) ──
let clickCount = 0, clickTimer = null;
window.countClick = function(e) {
  clickCount++;
  if (clickTimer) clearTimeout(clickTimer);
  clickTimer = setTimeout(() => { clickCount = 0; }, 3000);
  if (clickCount >= 10) {
    clickCount = 0;
    const pw = prompt("관리자 비밀번호를 입력하세요");
    if (pw !== "2026") { alert("비밀번호가 틀렸습니다."); return; }
    if (!confirm("정말 모든 참가자를 삭제하시겠습니까?")) return;
    remove(ref(db, "predictions"))
      .then(() => {
        remove(ref(db, "devices"));
        localStorage.removeItem('wc_device_id');
        alert("초기화 완료");
      })
      .catch(err => alert("오류: " + err.message));
  }
};

// ── 토스트 알림 ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── 앱 시작: Firebase에서 이 기기의 베팅 여부 확인 ──
function goToPage2(name, sa, ko) {
  myName  = name;
  myBetSA = sa;
  myBetKO = ko;
  document.getElementById('my-bet-label').textContent =
    '내 베팅: 남아공 ' + sa + ' : ' + ko + ' 대한민국';
  document.getElementById('s1').classList.remove('active');
  document.getElementById('s2').classList.add('active');
  renderGrid();
  window.scrollTo(0, 0);
}

get(ref(db, 'devices/' + deviceId)).then(snapshot => {
  if (snapshot.exists()) {
    const saved = snapshot.val();
    goToPage2(saved.name, saved.sa, saved.ko);
  } else {
    renderPickGrid();
  }
}).catch(() => {
  // 네트워크 오류 등 → 안전하게 1페이지 표시
  renderPickGrid();
});
</script>
